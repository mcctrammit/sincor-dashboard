    .header-right { display: flex; align-items: center; gap: 14px; }
    #last-update { font-size: 12px; color: var(--muted); }
    #theme-btn { background: none; border: 1px solid var(--border); border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; transition: border-color 0.15s, background 0.15s; }
    #theme-btn:hover { background: var(--bg); }
    #reload-btn { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500; padding: 7px 18px; border: 1px solid var(--purple); border-radius: 8px; background: transparent; color: var(--purple); cursor: pointer; transition: background 0.15s, color 0.15s; }
    #reload-btn:hover { background: var(--purple); color: #fff; }
    main { padding: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 1.75rem; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px 18px; transition: background 0.2s; }
    .stat-num { font-family: 'Poppins', sans-serif; font-size: 30px; font-weight: 700; letter-spacing: -0.03em; line-height: 1; margin-bottom: 4px; color: var(--purple); }
    .stat-label { font-size: 12px; color: var(--muted); font-weight: 500; }
    .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .filter-btn { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500; padding: 7px 18px; border-radius: 999px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; transition: all 0.15s; }
    .filter-btn:hover { color: var(--purple); border-color: var(--purple-light); }
    .filter-btn.active { background: var(--purple); color: #fff; border-color: var(--purple); }
    .boards { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; align-items: start; }
    .board-col { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; min-height: 120px; transition: background 0.2s; }
    .board-col.hidden { display: none; }
    .col-header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
    .col-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .col-title { font-family: 'Poppins', sans-serif; font-size: 14px; font-weight: 700; flex: 1; color: var(--purple-dark); }
    [data-theme="dark"] .col-title { color: var(--purple-light); }
    .col-count { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; color: var(--muted); background: var(--bg); border-radius: 999px; padding: 2px 10px; }
    .job-card { border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 10px; background: var(--bg); transition: border-color 0.15s, transform 0.1s, background 0.2s; }
    .job-card:last-child { margin-bottom: 0; }
    .job-card:hover { border-color: var(--purple-light); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(107,92,255,0.08); }
    .job-name { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500; line-height: 1.5; margin-bottom: 10px; color: var(--text); }
    .job-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 999px; margin-bottom: 12px; }
    .badge-dot { width: 6px; height: 6px; border-radius: 50%; }
    .job-dates { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .date-item { display: flex; flex-direction: column; gap: 3px; }
    .date-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--faint); font-weight: 600; }
    .date-val { font-family: 'Inter', sans-serif; font-size: 12px; color: var(--muted); font-weight: 500; }
    .empty-col { text-align: center; padding: 32px 12px; font-size: 13px; color: var(--faint); }
    #loading-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 100; }
    .spinner-ring { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--purple); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: var(--muted); font-weight: 500; }
    #error-banner { display: none; background: #FFF0F0; border: 1px solid #FFCDD2; border-radius: 12px; padding: 14px 18px; font-size: 13px; color: #C62828; margin-bottom: 1.5rem; }
    @media (max-width: 600px) {
      header { padding: 0 1rem; }
      main { padding: 1rem; }
      .boards { grid-template-columns: 1fr; }
    }
  </style>
</head>

<main>
  <div id="stats-row" class="stats-row"></div>
  <div id="error-banner"></div>
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all',this)">Todos</button>
    <button class="filter-btn" onclick="setFilter('doing',this)">Em Andamento</button>
    <button class="filter-btn" onclick="setFilter('approval',this)">Em Aprovação</button>
    <button class="filter-btn" onclick="setFilter('done',this)">Entregues</button>
  </div>
  <div class="boards">
    <div class="board-col" id="col-doing">
      <div class="col-header">
        <div class="col-dot" style="background:var(--doing-dot)"></div>
        <span class="col-title">Em Andamento</span>
        <span class="col-count" id="cnt-doing">0</span>
      </div>
      <div id="cards-doing"><div class="empty-col">Nenhum job aqui</div></div>
    </div>
    <div class="board-col" id="col-approval">
      <div class="col-header">
        <div class="col-dot" style="background:var(--approval-dot)"></div>
        <span class="col-title">Em Aprovação</span>
        <span class="col-count" id="cnt-approval">0</span>
      </div>
      <div id="cards-approval"><div class="empty-col">Nenhum job aqui</div></div>
    </div>
    <div class="board-col" id="col-done">
      <div class="col-header">
        <div class="col-dot" style="background:var(--done-dot)"></div>
        <span class="col-title">Entregues</span>
        <span class="col-count" id="cnt-done">0</span>
      </div>
      <div id="cards-done"><div class="empty-col">Nenhum job aqui</div></div>
    </div>
  </div>
</main>

<script>
  const BLOCKED_WORDS = ['interno', 'reunião', 'reuniao', 'brainstorm', 'padrão', 'padrao'];

  // Runrunit real states: "queued", "working" → Em Andamento | "done","closed","cancelled" → Entregues
  function mapStatus(j, hasApprovalSubtask) {
    const state = (j.state || j.current_state || j.status || '').toLowerCase();
    if (state === 'done' || state === 'closed') return 'done';
    if (state === 'cancelled' || state === 'canceled') return 'done';
    if (hasApprovalSubtask) return 'approval';
    return 'doing';
  }

  const STATUS_INFO = {
    doing:    { label: 'Em Andamento', bg: 'var(--doing-bg)',    text: 'var(--doing-text)',    dot: 'var(--doing-dot)'    },
    approval: { label: 'Em Aprovação', bg: 'var(--approval-bg)', text: 'var(--approval-text)', dot: 'var(--approval-dot)' },
    done:     { label: 'Entregue',     bg: 'var(--done-bg)',      text: 'var(--done-text)',      dot: 'var(--done-dot)'     },
  };

  function isBlocked(name) {
    if (!name) return false;
    const lower = name.toLowerCase();
    return BLOCKED_WORDS.some(w => lower.includes(w));
  }

  function fmtDate(d) {
    if (!d) return '—';
    const dt = new Date(d);
    if (isNaN(dt)) return '—';
    return dt.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: '2-digit' });
  }

  let currentFilter = 'all';
  let isDark = false;

  function toggleTheme() {
    isDark = !isDark;
    document.documentElement.setAttribute('data-theme', isDark ? 'dark' : '');
    document.getElementById('theme-btn').textContent = isDark ? '☀️' : '🌙';
    const logo = document.getElementById('logo-img');
    logo.style.filter = isDark ? 'brightness(0) invert(1)' : '';
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    ['doing','approval','done'].forEach(k => {
      document.getElementById('col-' + k).classList.toggle('hidden', f !== 'all' && f !== k);
    });
  }

  async function loadJobs() {
    document.getElementById('loading-overlay').style.display = 'flex';
    document.getElementById('error-banner').style.display = 'none';
    try {
      // Busca tasks principais e subtasks em paralelo
      const [respTasks, respSubs] = await Promise.all([
        fetch('/api/jobs'),
        fetch('/api/subtasks')
      ]);

      if (!respTasks.ok) throw new Error('Erro HTTP tasks: ' + respTasks.status);

      const dataTasks = await respTasks.json();
      const all = Array.isArray(dataTasks) ? dataTasks : (dataTasks.tasks || dataTasks.data || []);

      // Subtasks: monta set de IDs de tasks pai que têm subtask em aprovação
      let approvalParentIds = new Set();
      if (respSubs.ok) {
        const dataSubs = await respSubs.json();
        const subs = Array.isArray(dataSubs) ? dataSubs : (dataSubs.tasks || dataSubs.data || []);
        subs.forEach(s => {
          const stage = (s.board_stage_title || s.stage || s.current_state_name || '').toLowerCase();
          if (stage.includes('aprovação') || stage.includes('aprovacao') || stage.includes('aprovação com o cliente')) {
            if (s.parent_task_id) approvalParentIds.add(s.parent_task_id);
          }
        });
      }

      const jobs = all.filter(j => {
        if (j.parent_task_id || j.is_subtask === true) return false;
        if (isBlocked(j.title || j.name)) return false;
        return true;
      });

      renderDashboard(jobs, approvalParentIds);
    } catch(e) {
      const banner = document.getElementById('error-banner');
      banner.textContent = 'Não foi possível carregar os jobs: ' + e.message;
      banner.style.display = 'block';
    } finally {
      document.getElementById('loading-overlay').style.display = 'none';
    }
  }

  function renderDashboard(jobs, approvalParentIds) {
    const cols = { doing: [], approval: [], done: [] };

    jobs.forEach(j => {
      const hasApproval = approvalParentIds.has(j.id);
      const bucket = mapStatus(j, hasApproval);
      cols[bucket].push(j);
    });

    ['doing','approval','done'].forEach(k => {
      document.getElementById('cnt-' + k).textContent = cols[k].length;
      const cont = document.getElementById('cards-' + k);
      cont.innerHTML = '';
      if (cols[k].length === 0) {
        cont.innerHTML = '<div class="empty-col">Nenhum job aqui</div>';
        return;
      }
      cols[k].forEach(j => {
        const info = STATUS_INFO[k];
        const deliveryDate = j.desired_date || j.due_date || j.deadline;
        const card = document.createElement('div');
        card.className = 'job-card';
        card.innerHTML = `
          <div class="job-name">${j.title || j.name || 'Job #' + j.id}</div>
          <div class="job-badge" style="background:${info.bg};color:${info.text}">
            <div class="badge-dot" style="background:${info.dot}"></div>
            ${info.label}
          </div>
          <div class="job-dates">
            <div class="date-item">
              <span class="date-label">Início</span>
              <span class="date-val">${fmtDate(j.start_date || j.desired_start_date || j.created_at)}</span>
            </div>
            <div class="date-item">
              <span class="date-label">Entrega Prevista</span>
              <span class="date-val">${fmtDate(deliveryDate)}</span>
            </div>
          </div>`;
        cont.appendChild(card);
      });
    });

    document.getElementById('stats-row').innerHTML = [
      { n: jobs.length,              l: 'Total' },
      { n: cols.doing.length,        l: 'Em Andamento' },
      { n: cols.approval.length,     l: 'Em Aprovação' },
      { n: cols.done.length,         l: 'Entregues' },
    ].map(s => `<div class="stat-card"><div class="stat-num">${s.n}</div><div class="stat-label">${s.l}</div></div>`).join('');

    const now = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('last-update').textContent = 'Atualizado às ' + now;
  }

  loadJobs();
</script>
</body>
</html>
