<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sincor-SP — Painel de Jobs</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #F7F6F3;
      --surface: #FFFFFF;
      --border: #E5E2DA;
      --text: #1A1916;
      --muted: #8A8780;
      --faint: #C5C2BB;

      --doing-bg: #EBF3FF;
      --doing-text: #1A5FAA;
      --doing-dot: #3B82F6;

      --todo-bg: #FEF6E4;
      --todo-text: #9A6200;
      --todo-dot: #F59E0B;

      --done-bg: #E7F8F0;
      --done-text: #1A7A4A;
      --done-dot: #10B981;

      --cancelled-bg: #F3F2F0;
      --cancelled-text: #666360;
      --cancelled-dot: #A8A5A0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      background: var(--text);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-mark span {
      color: white;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .logo-name {
      font-size: 15px;
      font-weight: 500;
      letter-spacing: -0.01em;
    }

    .logo-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 1px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #last-update {
      font-size: 12px;
      color: var(--muted);
    }

    #reload-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      padding: 7px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s;
    }
    #reload-btn:hover { background: var(--bg); }

    main { padding: 2rem; }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 1.75rem;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
    }

    .stat-num {
      font-size: 28px;
      font-weight: 300;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 12px;
      color: var(--muted);
    }

    .filter-bar {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .filter-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn:hover { color: var(--text); border-color: var(--faint); }
    .filter-btn.active {
      background: var(--text);
      color: white;
      border-color: var(--text);
    }

    .boards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 14px;
      align-items: start;
    }

    .board-col {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      min-height: 100px;
    }

    .board-col.hidden { display: none; }

    .col-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .col-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .col-title {
      font-size: 13px;
      font-weight: 500;
      flex: 1;
    }

    .col-count {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      background: var(--bg);
      border-radius: 999px;
      padding: 2px 9px;
    }

    .job-card {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px;
      margin-bottom: 8px;
      background: var(--bg);
      transition: border-color 0.15s, transform 0.1s;
    }

    .job-card:last-child { margin-bottom: 0; }
    .job-card:hover { border-color: var(--faint); transform: translateY(-1px); }

    .job-name {
      font-size: 13px;
      font-weight: 500;
      line-height: 1.45;
      margin-bottom: 9px;
      color: var(--text);
    }

    .job-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 9px;
      border-radius: 999px;
      margin-bottom: 10px;
    }

    .badge-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
    }

    .job-dates {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .date-item { display: flex; flex-direction: column; gap: 3px; }

    .date-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--faint);
      font-weight: 500;
    }

    .date-val {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--muted);
    }

    .date-val.overdue { color: #C0392B; }

    .empty-col {
      text-align: center;
      padding: 28px 12px;
      font-size: 13px;
      color: var(--faint);
    }

    #loading-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 100;
    }

    .spinner-ring {
      width: 36px;
      height: 36px;
      border: 2px solid var(--border);
      border-top-color: var(--text);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-size: 14px;
      color: var(--muted);
    }

    #error-banner {
      display: none;
      background: #FEF2F2;
      border: 1px solid #FECACA;
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 13px;
      color: #C0392B;
      margin-bottom: 1.5rem;
    }

    @media (max-width: 600px) {
      header { padding: 0 1rem; }
      main { padding: 1rem; }
      .boards { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner-ring"></div>
  <div class="loading-text">Carregando jobs…</div>
</div>

<header>
  <div class="logo-area">
    <div class="logo-mark"><span>SC</span></div>
    <div>
      <div class="logo-name">Sincor-SP</div>
      <div class="logo-sub">Painel de Jobs</div>
    </div>
  </div>
  <div class="header-right">
    <span id="last-update"></span>
    <button id="reload-btn" onclick="loadJobs()">↻ Atualizar</button>
  </div>
</header>

<main>
  <div id="error-banner"></div>

  <div class="stats-row" id="stats-row"></div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all', this)">Todos</button>
    <button class="filter-btn" onclick="setFilter('doing', this)">Em Andamento</button>
    <button class="filter-btn" onclick="setFilter('todo', this)">A Fazer</button>
    <button class="filter-btn" onclick="setFilter('done', this)">Finalizadas</button>
    <button class="filter-btn" onclick="setFilter('cancelled', this)">Canceladas</button>
  </div>

  <div class="boards">
    <div class="board-col" id="col-doing">
      <div class="col-header">
        <div class="col-dot" style="background:var(--doing-dot)"></div>
        <span class="col-title">Em Andamento</span>
        <span class="col-count" id="cnt-doing">0</span>
      </div>
      <div id="cards-doing"></div>
    </div>
    <div class="board-col" id="col-todo">
      <div class="col-header">
        <div class="col-dot" style="background:var(--todo-dot)"></div>
        <span class="col-title">A Fazer</span>
        <span class="col-count" id="cnt-todo">0</span>
      </div>
      <div id="cards-todo"></div>
    </div>
    <div class="board-col" id="col-done">
      <div class="col-header">
        <div class="col-dot" style="background:var(--done-dot)"></div>
        <span class="col-title">Finalizadas</span>
        <span class="col-count" id="cnt-done">0</span>
      </div>
      <div id="cards-done"></div>
    </div>
    <div class="board-col" id="col-cancelled">
      <div class="col-header">
        <div class="col-dot" style="background:var(--cancelled-dot)"></div>
        <span class="col-title">Canceladas</span>
        <span class="col-count" id="cnt-cancelled">0</span>
      </div>
      <div id="cards-cancelled"></div>
    </div>
  </div>
</main>

<script>
  const STATUS_MAP = {
    doing:     { label: 'Em Andamento', bg: 'var(--doing-bg)',     text: 'var(--doing-text)',     dot: 'var(--doing-dot)',     col: 'doing' },
    todo:      { label: 'A Fazer',      bg: 'var(--todo-bg)',      text: 'var(--todo-text)',      dot: 'var(--todo-dot)',      col: 'todo' },
    done:      { label: 'Finalizada',   bg: 'var(--done-bg)',      text: 'var(--done-text)',      dot: 'var(--done-dot)',      col: 'done' },
    cancelled: { label: 'Cancelada',    bg: 'var(--cancelled-bg)', text: 'var(--cancelled-text)', dot: 'var(--cancelled-dot)', col: 'cancelled' },
    paused:    { label: 'Pausada',      bg: 'var(--todo-bg)',      text: 'var(--todo-text)',      dot: 'var(--todo-dot)',      col: 'todo' },
  };

  function mapStatus(s) {
    if (!s) return 'todo';
    const sl = s.toLowerCase();
    if (sl === 'doing') return 'doing';
    if (sl === 'done') return 'done';
    if (sl === 'cancelled' || sl === 'canceled') return 'cancelled';
    if (sl === 'paused') return 'paused';
    return 'todo';
  }

  function fmtDate(d) {
    if (!d) return '—';
    const dt = new Date(d);
    if (isNaN(dt)) return '—';
    return dt.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: '2-digit' });
  }

  function isOverdue(d) {
    if (!d) return false;
    return new Date(d) < new Date();
  }

  let currentFilter = 'all';

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    ['doing','todo','done','cancelled'].forEach(k => {
      const col = document.getElementById('col-' + k);
      col.classList.toggle('hidden', f !== 'all' && f !== k);
    });
  }

  async function loadJobs() {
    document.getElementById('loading-overlay').style.display = 'flex';
    document.getElementById('error-banner').style.display = 'none';

    try {
      const resp = await fetch('/api/jobs');
      if (!resp.ok) throw new Error('Erro HTTP ' + resp.status);
      const data = await resp.json();
      const jobs = Array.isArray(data) ? data : (data.tasks || data.data || []);
      renderDashboard(jobs);
    } catch(e) {
      const banner = document.getElementById('error-banner');
      banner.textContent = 'Não foi possível carregar os jobs: ' + e.message;
      banner.style.display = 'block';
    } finally {
      document.getElementById('loading-overlay').style.display = 'none';
    }
  }

  function renderDashboard(jobs) {
    const cols = { doing: [], todo: [], done: [], cancelled: [] };

    jobs.forEach(j => {
      const s = mapStatus(j.current_state || j.state || j.status);
      const bucket = s === 'paused' ? 'todo' : s;
      if (cols[bucket]) cols[bucket].push(j);
    });

    ['doing','todo','done','cancelled'].forEach(k => {
      document.getElementById('cnt-' + k).textContent = cols[k].length;
      const cont = document.getElementById('cards-' + k);
      cont.innerHTML = '';

      if (cols[k].length === 0) {
        cont.innerHTML = '<div class="empty-col">Nenhum job aqui</div>';
        return;
      }

      cols[k].forEach(j => {
        const s = mapStatus(j.current_state || j.state || j.status);
        const info = STATUS_MAP[s] || STATUS_MAP.todo;
        const deliveryDate = j.desired_date || j.due_date || j.deadline;
        const overdue = isOverdue(deliveryDate) && k !== 'done' && k !== 'cancelled';

        const card = document.createElement('div');
        card.className = 'job-card';
        card.innerHTML = `
          <div class="job-name">${j.title || j.name || 'Job #' + j.id}</div>
          <div class="job-badge" style="background:${info.bg};color:${info.text}">
            <div class="badge-dot" style="background:${info.dot}"></div>
            ${info.label}
          </div>
          <div class="job-dates">
            <div class="date-item">
              <span class="date-label">Início</span>
              <span class="date-val">${fmtDate(j.start_date || j.created_at)}</span>
            </div>
            <div class="date-item">
              <span class="date-label">Entrega</span>
              <span class="date-val ${overdue ? 'overdue' : ''}">${fmtDate(deliveryDate)}</span>
            </div>
          </div>`;
        cont.appendChild(card);
      });
    });

    const stats = [
      { n: jobs.length,              l: 'Total de jobs' },
      { n: cols.doing.length,        l: 'Em andamento' },
      { n: cols.todo.length,         l: 'A fazer' },
      { n: cols.done.length,         l: 'Finalizadas' },
      { n: cols.cancelled.length,    l: 'Canceladas' },
    ];

    document.getElementById('stats-row').innerHTML = stats.map(s =>
      `<div class="stat-card"><div class="stat-num">${s.n}</div><div class="stat-label">${s.l}</div></div>`
    ).join('');

    const now = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('last-update').textContent = 'Atualizado às ' + now;
  }

  loadJobs();
</script>
</body>
</html>
